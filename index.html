    function parseCSV(text) {
      const parsed = Papa.parse(text.trim(), { header: true, skipEmptyLines: true });
      return parsed.data.map((row) => {
        const out = {};
        for (const [k, v] of Object.entries(row)) {
          out[k] = (k !== "month" && k !== "name" && v !== "" && !isNaN(Number(v))) ? parseFloat(v) : v;

        return out;
      });

        }
      }

      // 2. Try fetching local JSON file (works when served via HTTP)
      try {
        const resp = await fetch(FALLBACK_JSON);
        if (resp.ok) return resp.json();
      } catch (err) {
        console.warn("JSON fetch failed (likely file:// protocol), using inline data:", err);
      }

      // 3. Final fallback: inline embedded data (works everywhere including file://)
      if (typeof INLINE_DATA !== "undefined") return INLINE_DATA;

      throw new Error("Could not load data. Configure SHEET_URLS at the top of index.html, or serve via HTTP.");
    }

    /* ── OVERVIEW TAB ──────────────────────────────────────────── */
    function OverviewTab({ data, range, showGross }) {
      const rows = useMemo(() => data.overview.slice(range[0], range[1] + 1), [data, range]);
      const key = showGross ? "Gross" : "Net";

      const totalRev = rows.reduce((s, d) => s + d[`total${key}`], 0);
      const memRev = rows.reduce((s, d) => s + d[`membership${key}`], 0);
      const cafeRev = rows.reduce((s, d) => s + d[`cafe${key}`], 0);
      const otherRev = rows.reduce((s, d) => s + d[`other${key}`], 0);
      const latest = rows[rows.length - 1] || {};
      const prev = rows.length >= 2 ? rows[rows.length - 2] : latest;
      const momTrend = prev[`total${key}`] > 0 ? ((latest[`total${key}`] - prev[`total${key}`]) / prev[`total${key}`]) * 100 : 0;

      const pieData = [
        { name: "Membership", value: memRev, color: PALETTE.indigo },
        { name: "Cafe", value: cafeRev, color: PALETTE.violet },
        { name: "Other", value: otherRev, color: PALETTE.purple },
      ];

      const chartData = rows.map((d) => ({
        month: d.month, Membership: d[`membership${key}`], Cafe: d[`cafe${key}`], Other: d[`other${key}`],
      }));

      const period = data.overview.length > 0 ? `${data.overview[0].month} \u2013 ${data.overview[data.overview.length - 1].month}` : "";

      return (
        <div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <KpiCard title={`Total Revenue (${showGross ? "gross" : "net"})`} value={fmtFull(totalRev)} sub={period} trend={momTrend} trendUp={momTrend >= 0}
              secondary={showGross ? `Net: ${fmtFull(rows.reduce((s, d) => s + d.totalNet, 0))}` : `Gross: ${fmtFull(rows.reduce((s, d) => s + d.totalGross, 0))}`} />
            <KpiCard title="Membership" value={fmtFull(memRev)} sub={`${totalRev > 0 ? ((memRev / totalRev) * 100).toFixed(0) : 0}% of total`} />
            <KpiCard title="Cafe" value={fmtFull(cafeRev)} sub={`${totalRev > 0 ? ((cafeRev / totalRev) * 100).toFixed(0) : 0}% of total`} />
            <KpiCard title="Other Revenue" value={fmtFull(otherRev)} sub={`${totalRev > 0 ? ((otherRev / totalRev) * 100).toFixed(0) : 0}% of total`} />
          </div>
          <div className="grid md:grid-cols-3 gap-6">
            <SectionCard title="Revenue by Month" className="md:col-span-2">
              <ResponsiveContainer width="100%" height={320}>
                <AreaChart data={chartData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                  <XAxis {...chartXAxis(chartData)} />
                  <YAxis tickFormatter={fmt} tick={{ fontSize: 11 }} />
                  <Tooltip formatter={(v) => fmtFull(v)} />
                  <Legend iconType="circle" iconSize={8} />
                  <Area type="monotone" dataKey="Membership" stackId="1" stroke={PALETTE.indigo} fill={PALETTE.indigo} fillOpacity={0.6} />
                  <Area type="monotone" dataKey="Cafe" stackId="1" stroke={PALETTE.violet} fill={PALETTE.violet} fillOpacity={0.6} />
                  <Area type="monotone" dataKey="Other" stackId="1" stroke={PALETTE.purple} fill={PALETTE.purple} fillOpacity={0.6} />
                </AreaChart>
              </ResponsiveContainer>
            </SectionCard>
            <SectionCard title="Revenue Split">
              <ResponsiveContainer width="100%" height={200}>
                <PieChart>
                  <Pie data={pieData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2} dataKey="value">
                    {pieData.map((e, i) => <Cell key={i} fill={e.color} />)}
                  </Pie>
                  <Tooltip formatter={(v) => fmtFull(v)} />
                </PieChart>
              </ResponsiveContainer>
              <div className="space-y-2 mt-2">
                {pieData.map((c) => (
                  <div key={c.name} className="flex items-center justify-between text-sm">
                    <div className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full" style={{ backgroundColor: c.color }} />
                      <span className="text-gray-700">{c.name}</span>
                    </div>
                    <span className="text-gray-500 font-medium">{fmtFull(c.value)}</span>
                  </div>
                ))}
              </div>
            </SectionCard>
          </div>
        </div>
      );
    }

    /* ── MEMBERSHIP TAB ────────────────────────────────────────── */
    function MembershipTab({ data, range, showGross }) {
      const rows = useMemo(() => data.membership.slice(range[0], range[1] + 1), [data, range]);
      const key = showGross ? "Gross" : "Net";
      const revKey = showGross ? "grossRevenue" : "netRevenue";

      const latest = rows[rows.length - 1] || {};
      const prev = rows.length >= 2 ? rows[rows.length - 2] : latest;
      const totalRev = rows.reduce((s, d) => s + d[revKey], 0);
      const totalNew = rows.reduce((s, d) => s + d.newMembers, 0);
      const totalChurned = rows.reduce((s, d) => s + d.churned, 0);
      const avgChurn = rows.length > 0 ? (rows.reduce((s, d) => s + d.churnRate, 0) / rows.length).toFixed(1) : "0";
      const arpmKey = showGross ? "arpmGross" : "arpmNet";
      const memberTrend = prev.activeMembers > 0 ? ((latest.activeMembers - prev.activeMembers) / prev.activeMembers) * 100 : 0;

      return (
        <div>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <KpiCard title="Active Members" value={latest.activeMembers || 0} trend={memberTrend} trendUp={memberTrend >= 0}
              secondary={`Recurring: ${latest.recurringMembers || 0} | Fixed: ${latest.fixedTermMembers || 0}`} />
            <KpiCard title="New Members" value={totalNew} sub="selected period" />
            <KpiCard title="Churned" value={totalChurned} sub="selected period" />
            <KpiCard title="Avg Churn Rate" value={`${avgChurn}%`} sub="monthly avg" />
            <KpiCard title={`Revenue (${showGross ? "gross" : "net"})`} value={fmtFull(totalRev)} sub="selected period" />
          </div>

          <div className="grid md:grid-cols-2 gap-6 mb-6">
            <SectionCard title="Active Members — Recurring vs Fixed-term">
              <ResponsiveContainer width="100%" height={300}>
                <AreaChart data={rows}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                  <XAxis {...chartXAxis(rows)} />
                  <YAxis tick={{ fontSize: 11 }} />
                  <Tooltip />
                  <Legend iconType="circle" iconSize={8} />
                  <Area type="monotone" dataKey="recurringMembers" stackId="1" stroke={PALETTE.indigo} fill={PALETTE.indigo} fillOpacity={0.6} name="Recurring" />
                  <Area type="monotone" dataKey="fixedTermMembers" stackId="1" stroke={PALETTE.violet} fill={PALETTE.violet} fillOpacity={0.6} name="Fixed-term" />
                </AreaChart>
              </ResponsiveContainer>
            </SectionCard>
            <SectionCard title="Intros &amp; Frozen">
              <ResponsiveContainer width="100%" height={300}>
                <ComposedChart data={rows}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                  <XAxis {...chartXAxis(rows)} />
                  <YAxis tick={{ fontSize: 11 }} />
                  <Tooltip />
                  <Legend iconType="circle" iconSize={8} />
                  <Bar dataKey="introMembers" fill={PALETTE.amber} name="Intro / Trial" radius={[3,3,0,0]} />
                  <Line type="monotone" dataKey="frozenMembers" stroke={PALETTE.slate} strokeWidth={2} dot={rows.length <= 18 ? { r: 3 } : false} name="Frozen" />
                </ComposedChart>
              </ResponsiveContainer>
            </SectionCard>
          </div>

          <div className="grid md:grid-cols-2 gap-6 mb-6">
            <SectionCard title="New Members vs Churned">
              <ResponsiveContainer width="100%" height={280}>
                <BarChart data={rows}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                  <XAxis {...chartXAxis(rows)} />
                  <YAxis tick={{ fontSize: 11 }} />
                  <Tooltip />
                  <Legend iconType="circle" iconSize={8} />
                  <Bar dataKey="newMembers" fill={PALETTE.indigo} name="New Members" radius={[3,3,0,0]} />
                  <Bar dataKey="churned" fill={PALETTE.red} name="Churned" radius={[3,3,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </SectionCard>
            <SectionCard title={`Monthly Revenue (${showGross ? "gross" : "net"})`}>
              <ResponsiveContainer width="100%" height={280}>
                <AreaChart data={rows}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                  <XAxis {...chartXAxis(rows)} />
                  <YAxis tickFormatter={fmt} tick={{ fontSize: 11 }} />
                  <Tooltip formatter={(v) => fmtFull(v)} />
                  <Legend iconType="circle" iconSize={8} />
                  <Area type="monotone" dataKey={showGross ? "recurringGross" : "recurringNet"} stackId="1" stroke={PALETTE.indigo} fill={PALETTE.indigo} fillOpacity={0.6} name="Recurring" />
                  <Area type="monotone" dataKey={showGross ? "fixedTermGross" : "fixedTermNet"} stackId="1" stroke={PALETTE.violet} fill={PALETTE.violet} fillOpacity={0.6} name="Fixed-term" />
                  <Area type="monotone" dataKey={showGross ? "introGross" : "introNet"} stackId="1" stroke={PALETTE.amber} fill={PALETTE.amber} fillOpacity={0.4} name="Intros" />
                </AreaChart>
              </ResponsiveContainer>
            </SectionCard>
          </div>

          <SectionCard title={`ARPM — Average Revenue Per Member (${showGross ? "gross" : "net"})`}>
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={rows}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                <XAxis {...chartXAxis(rows)} />
                <YAxis tickFormatter={(v) => `\u00a3${v}`} tick={{ fontSize: 11 }} />
                <Tooltip formatter={(v) => `\u00a3${v.toFixed(2)}`} />
                <Bar dataKey={arpmKey} fill={PALETTE.purple} name="ARPM" radius={[3,3,0,0]} />
              </BarChart>
            </ResponsiveContainer>
          </SectionCard>
        </div>
      );
    }

    /* ── CAFE TAB ──────────────────────────────────────────────── */
    function CafeTab({ data, range, showGross }) {
      const rows = useMemo(() => data.cafe.slice(range[0], range[1] + 1), [data, range]);
      const revKey = showGross ? "grossRevenue" : "netRevenue";
      const totalRev = rows.reduce((s, d) => s + d[revKey], 0);
      const totalTx = rows.reduce((s, d) => s + d.transactions, 0);
      const avgPerTx = totalTx > 0 ? totalRev / totalTx : 0;
      const latest = rows[rows.length - 1] || {};
      const prev = rows.length >= 2 ? rows[rows.length - 2] : latest;
      const momTrend = prev[revKey] > 0 ? ((latest[revKey] - prev[revKey]) / prev[revKey]) * 100 : 0;

      const products = data.cafeProducts || [];
      const prodRevKey = showGross ? "revenueGross" : "revenueNet";

      return (
        <div>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <KpiCard title={`Cafe Revenue (${showGross ? "gross" : "net"})`} value={fmtFull(totalRev)} sub="selected period" trend={momTrend} trendUp={momTrend >= 0} />
            <KpiCard title="Transactions" value={totalTx.toLocaleString()} sub="selected period" />
            <KpiCard title="Avg per Transaction" value={`\u00a3${avgPerTx.toFixed(2)}`} sub={showGross ? "gross" : "net"} />
            <KpiCard title="This Month" value={fmtFull(latest[revKey] || 0)} sub={`${latest.transactions || 0} transactions`} />
          </div>

          <SectionCard title={`Monthly Revenue (${showGross ? "gross" : "net"})`} className="mb-6">
            <ResponsiveContainer width="100%" height={300}>
              <ComposedChart data={rows}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                <XAxis {...chartXAxis(rows)} />
                <YAxis yAxisId="rev" tickFormatter={fmt} tick={{ fontSize: 11 }} />
                <YAxis yAxisId="tx" orientation="right" tick={{ fontSize: 11 }} />
                <Tooltip formatter={(v, name) => name === "Transactions" ? v : fmtFull(v)} />
                <Legend iconType="circle" iconSize={8} />
                <Area yAxisId="rev" type="monotone" dataKey={revKey} stroke={PALETTE.indigo} fill={PALETTE.indigo} fillOpacity={0.15} strokeWidth={2} name="Revenue" />
                <Line yAxisId="tx" type="monotone" dataKey="transactions" stroke={PALETTE.amber} strokeWidth={1.5} dot={false} name="Transactions" strokeDasharray="4 4" />
              </ComposedChart>
            </ResponsiveContainer>
          </SectionCard>

          <SectionCard title="Top Products (all-time, by revenue)">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-200">
                    <th className="text-left py-2 px-3 text-gray-500 font-medium">#</th>
                    <th className="text-left py-2 px-3 text-gray-500 font-medium">Product</th>
                    <th className="text-right py-2 px-3 text-gray-500 font-medium">Revenue ({showGross ? "gross" : "net"})</th>
                    <th className="text-right py-2 px-3 text-gray-500 font-medium">Units</th>
                    <th className="text-right py-2 px-3 text-gray-500 font-medium">Avg Price</th>
                  </tr>
                </thead>
                <tbody>
                  {products.slice(0, 25).map((p, i) => (
                    <tr key={p.name} className="border-b border-gray-50 hover:bg-gray-50">
                      <td className="py-2 px-3 text-gray-400 text-xs">{i + 1}</td>
                      <td className="py-2 px-3 font-medium text-gray-800">{p.name}</td>
                      <td className="py-2 px-3 text-right text-gray-600">{fmtFull(p[prodRevKey])}</td>
                      <td className="py-2 px-3 text-right text-gray-600">{p.units.toLocaleString()}</td>
                      <td className="py-2 px-3 text-right text-gray-600">{`\u00a3${(p[prodRevKey] / p.units).toFixed(2)}`}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </SectionCard>
        </div>
      );
    }

    /* ── OTHER REVENUE TAB ─────────────────────────────────────── */
    function OtherRevenueTab({ data, range, showGross }) {
      const rows = useMemo(() => data.otherRevenue.slice(range[0], range[1] + 1), [data, range]);
      const key = showGross ? "Gross" : "Net";

      const streams = [
        { key: "passes", label: "Day Passes", color: PALETTE.indigo },
        { key: "manualDebit", label: "Manual Debits", color: PALETTE.violet },
        { key: "penaltyFee", label: "Penalty Fees", color: PALETTE.amber },
        { key: "oneOff", label: "One-off Purchases", color: PALETTE.blue },
        { key: "creditNote", label: "Credit Notes", color: PALETTE.red },
        { key: "other", label: "Other", color: PALETTE.slate },
      ];

      const totals = streams.map((s) => ({
        ...s,
        total: rows.reduce((sum, d) => sum + (d[`${s.key}${key}`] || 0), 0),
        count: rows.reduce((sum, d) => sum + (d[`${s.key}Count`] || 0), 0),
      }));
      const grandTotal = totals.reduce((s, t) => s + t.total, 0);

      const chartData = rows.map((d) => {
        const obj = { month: d.month };
        streams.forEach((s) => { obj[s.label] = d[`${s.key}${key}`] || 0; });
        return obj;
      });

      return (
        <div>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
            {totals.filter(t => Math.abs(t.total) > 0).map((t) => (
              <KpiCard key={t.key} title={t.label} value={fmtFull(t.total)} sub={`${t.count.toLocaleString()} transactions`} />
            ))}
          </div>

          <SectionCard title={`Other Revenue by Month (${showGross ? "gross" : "net"})`} className="mb-6">
            <ResponsiveContainer width="100%" height={320}>
              <AreaChart data={chartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f3f4f6" />
                <XAxis {...chartXAxis(chartData)} />
                <YAxis tickFormatter={fmt} tick={{ fontSize: 11 }} />
                <Tooltip formatter={(v) => fmtFull(v)} />
                <Legend iconType="circle" iconSize={8} />
                {streams.filter(s => totals.find(t => t.key === s.key && Math.abs(t.total) > 0)).map((s) => (
                  <Area key={s.key} type="monotone" dataKey={s.label} stackId="1"
                    stroke={s.color} fill={s.color} fillOpacity={0.5} />
                ))}
              </AreaChart>
            </ResponsiveContainer>
          </SectionCard>

          <SectionCard title="Breakdown">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-200">
                    <th className="text-left py-2 px-3 text-gray-500 font-medium">Stream</th>
                    <th className="text-right py-2 px-3 text-gray-500 font-medium">Revenue ({showGross ? "gross" : "net"})</th>
                    <th className="text-right py-2 px-3 text-gray-500 font-medium">Transactions</th>
                    <th className="text-right py-2 px-3 text-gray-500 font-medium">% of Total</th>
                  </tr>
                </thead>
                <tbody>
                  {totals.filter(t => Math.abs(t.total) > 0).sort((a, b) => Math.abs(b.total) - Math.abs(a.total)).map((t) => (
                    <tr key={t.key} className="border-b border-gray-50 hover:bg-gray-50">
                      <td className="py-2.5 px-3 font-medium text-gray-800 flex items-center gap-2">
                        <div className="w-3 h-3 rounded-full" style={{ backgroundColor: t.color }} />
                        {t.label}
                      </td>
                      <td className={`py-2.5 px-3 text-right font-medium ${t.total < 0 ? "text-red-500" : "text-gray-700"}`}>{fmtFull(t.total)}</td>
                      <td className="py-2.5 px-3 text-right text-gray-600">{t.count.toLocaleString()}</td>
                      <td className="py-2.5 px-3 text-right text-gray-500">{grandTotal !== 0 ? `${((t.total / grandTotal) * 100).toFixed(1)}%` : "-"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </SectionCard>
        </div>
      );
    }

    /* ── MAIN APP ──────────────────────────────────────────────── */
    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);
      const [activeTab, setActiveTab] = useState("overview");
      const [range, setRange] = useState([0, 0]);
      const [showGross, setShowGross] = useState(false);

      useEffect(() => {
        loadData()
          .then((d) => {
            setData(d);
            const months = d.overview ? d.overview.length : 0;
            setRange([0, months - 1]);
          })
          .catch((err) => setError(err.message));
      }, []);

      if (error) return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center">
          <div className="bg-red-50 border border-red-200 rounded-xl p-8 max-w-md text-center">
            <p className="text-red-700 font-medium text-lg mb-2">Failed to load data</p>
            <p className="text-red-600 text-sm">{error}</p>
          </div>
        </div>
      );

      if (!data) return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center">
          <div className="text-center">
            <div className="spinner mx-auto mb-4"></div>
            <p className="text-gray-500 text-sm">Loading dashboard data...</p>
          </div>
        </div>
      );

      const MONTHS = (data.months || data.overview.map(d => d.month));
      const period = `${MONTHS[0]} \u2013 ${MONTHS[MONTHS.length - 1]}`;

      const safeRange = [Math.min(range[0], MONTHS.length - 1), Math.min(range[1], MONTHS.length - 1)];

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-white border-b border-gray-200 px-6 py-4">
            <div className="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-4">
              <div>
                <h1 className="text-xl font-bold text-gray-900">ONE LDN</h1>
                <p className="text-sm text-gray-500">Financial Dashboard &mdash; {period}</p>
              </div>
              <div className="flex items-center gap-4 flex-wrap">
                <DateRangeFilter months={MONTHS} range={safeRange} setRange={setRange} />
                <NetGrossToggle showGross={showGross} setShowGross={setShowGross} />
              </div>
            </div>
          </div>

          <div className="bg-white border-b border-gray-100 px-6">
            <div className="max-w-7xl mx-auto flex gap-1 overflow-x-auto">
              {TABS.map((tab) => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                  className={`px-4 py-3 text-sm font-medium transition-colors relative whitespace-nowrap ${
                    activeTab === tab.id ? "text-indigo-600" : "text-gray-500 hover:text-gray-700"
                  }`}>
                  {tab.label}
                  {activeTab === tab.id && <div className="absolute bottom-0 left-0 right-0 h-0.5 bg-indigo-600 rounded-full" />}
                </button>
              ))}
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-6 py-6">
            {activeTab === "overview" && <OverviewTab data={data} range={safeRange} showGross={showGross} />}
            {activeTab === "membership" && <MembershipTab data={data} range={safeRange} showGross={showGross} />}
            {activeTab === "cafe" && <CafeTab data={data} range={safeRange} showGross={showGross} />}
            {activeTab === "other" && <OtherRevenueTab data={data} range={safeRange} showGross={showGross} />}
          </div>

          <div className="max-w-7xl mx-auto px-6 py-4 border-t border-gray-100">
            <p className="text-xs text-gray-400 text-center">
              ONE LDN Financial Dashboard &middot; Built by Saffron &middot; {period} &middot; Real data from WodBoard
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
